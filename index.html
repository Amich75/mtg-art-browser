<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MTG Art Browser</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root { --top-height: 50vh; }

    body {
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: #111827;
      color: #e5e7eb;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
    }

    /* ── SOURCE BADGES ── */
    .source-badge {
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: 0.03em;
    }
    .scryfall-badge { background: rgba(124,58,237,.15); color: #a78bfa; border: 1px solid rgba(124,58,237,.35); }
    .da-badge       { background: rgba(5,150,105,.15);  color: #6ee7b7; border: 1px solid rgba(5,150,105,.35); }

    /* ── TOP PANEL ── */
    #top-panel {
      height: var(--top-height);
      min-height: 120px;
      display: flex;
      flex-direction: column;
      padding: 8px 12px 4px;
      gap: 5px;
      overflow: hidden;
    }

    #search-bars { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; }

    .search-row { display: flex; gap: 8px; align-items: center; }

    .search-input {
      flex: 1;
      padding: 7px 11px;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 6px;
      color: #f3f4f6;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
      min-width: 0;
    }
    .search-input:focus { border-color: #7c3aed; }
    .search-input::placeholder { color: #6b7280; }

    .search-btn {
      padding: 7px 14px;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .search-btn:disabled { background: #4b5563 !important; cursor: not-allowed; }
    #scryfall-btn { background: #7c3aed; }
    #scryfall-btn:hover:not(:disabled) { background: #6d28d9; }
    #da-btn { background: #059669; }
    #da-btn:hover:not(:disabled) { background: #047857; }

    #batch-toggle-btn {
      padding: 7px 12px;
      background: transparent;
      color: #6b7280;
      border: 1px solid #374151;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    #batch-toggle-btn:hover      { color: #e5e7eb; border-color: #6b7280; }
    #batch-toggle-btn.batch-open { color: #fcd34d; border-color: #92400e; background: rgba(245,158,11,.1); }

    /* ── BATCH PANEL ── */
    #batch-panel { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; animation: slideDown .15s ease; }
    #batch-panel[hidden] { display: none; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; } }

    #batch-input {
      width: 100%; height: 68px; resize: vertical; min-height: 44px; max-height: 130px;
      padding: 7px 10px;
      background: #1f2937; border: 1px solid #374151; border-radius: 6px;
      color: #f3f4f6; font-size: 12px; font-family: inherit; line-height: 1.5;
      outline: none; transition: border-color .15s;
    }
    #batch-input:focus { border-color: #7c3aed; }
    #batch-input::placeholder { color: #4b5563; }

    #batch-controls { display: flex; align-items: center; gap: 8px; }

    #batch-search-btn {
      padding: 6px 14px; background: #7c3aed; color: white;
      border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer;
    }
    #batch-search-btn:hover:not(:disabled) { background: #6d28d9; }
    #batch-search-btn:disabled { background: #4b5563; cursor: not-allowed; }

    #batch-cancel-btn {
      padding: 6px 12px; background: transparent; color: #f87171;
      border: 1px solid #f87171; border-radius: 6px; font-size: 12px; cursor: pointer;
    }
    #batch-cancel-btn:hover { background: rgba(248,113,113,.1); }
    #batch-cancel-btn[hidden] { display: none; }

    #batch-progress { font-size: 11px; color: #a78bfa; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── GENERAL STATUS BAR ── */
    #general-status { flex-shrink: 0; font-size: 11px; color: #6b7280; min-height: 14px; }
    #general-status.error   { color: #f87171; }
    #general-status.loading { color: #a78bfa; }
    #general-status.info    { color: #6b7280; }

    /* ── SPLIT RESULTS CONTAINER ── */
    #results-container {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }

    /* ── ART GRID PANE (left) ── */
    #art-grid-pane {
      flex: 0 0 38%;
      min-width: 150px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid #374151;
    }

    .pane-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 6px;
      flex-shrink: 0;
      border-bottom: 1px solid #1f2937;
    }

    .pane-status {
      font-size: 11px;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #4b5563;
    }
    .pane-status.loading { color: #a78bfa; }
    .pane-status.error   { color: #f87171; }
    .pane-status.info    { color: #6b7280; }

    #art-grid {
      flex: 1;
      overflow-y: auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 5px;
      padding: 6px;
    }
    #art-grid::-webkit-scrollbar       { width: 4px; }
    #art-grid::-webkit-scrollbar-track { background: #1f2937; }
    #art-grid::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 2px; }

    /* ── RESULT CARDS (thumbnails in grid) ── */
    .result-card {
      cursor: pointer;
      border-radius: 7px;
      overflow: hidden;
      border: 2px solid transparent;
      transition: border-color .15s, transform .15s, box-shadow .15s;
      aspect-ratio: 5 / 7;
      background: #1f2937;
      position: relative;
    }
    .result-card:hover {
      border-color: #7c3aed;
      transform: scale(1.05);
      box-shadow: 0 4px 16px rgba(124,58,237,.4);
      z-index: 1;
    }
    .result-card.selected {
      border-color: #f59e0b;
      box-shadow: 0 4px 16px rgba(245,158,11,.4);
    }
    .result-card.selected:hover { border-color: #fbbf24; }
    .result-card img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .card-source-badge {
      position: absolute; top: 3px; right: 3px;
      font-size: 8px; padding: 2px 4px; pointer-events: none;
    }
    .card-label {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,.88));
      padding: 14px 4px 3px; font-size: 9px; color: #d1d5db;
      line-height: 1.3; opacity: 0; transition: opacity .15s;
    }
    .result-card:hover .card-label { opacity: 1; }

    /* ── PREVIEW PANE (right) ── */
    #preview-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 10px;
      min-width: 0;
    }

    #preview-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #374151;
      font-size: 13px;
      text-align: center;
      gap: 6px;
      user-select: none;
    }
    #preview-empty-icon { font-size: 2.5rem; opacity: .5; }

    #preview-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
    }

    #preview-img-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      min-height: 0;
    }

    #preview-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,.7);
      display: block;
    }

    #preview-meta {
      flex-shrink: 0;
      text-align: center;
      padding: 2px 0 4px;
    }

    #preview-name {
      font-size: 15px;
      font-weight: 700;
      color: #f3f4f6;
      margin-bottom: 3px;
    }

    #preview-label {
      font-size: 11px;
      color: #9ca3af;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    #preview-actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    #preview-add-btn {
      padding: 8px 22px;
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    #preview-add-btn:hover:not(:disabled) { background: #6d28d9; }
    #preview-add-btn:disabled { background: #374151; color: #6b7280; cursor: not-allowed; }

    #preview-download-btn {
      padding: 8px 16px;
      background: transparent;
      color: #9ca3af;
      border: 1px solid #374151;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    #preview-download-btn:hover { color: #e5e7eb; border-color: #6b7280; }

    #preview-open-link {
      font-size: 11px;
      color: #6b7280;
      text-decoration: none;
      padding: 4px 8px;
      border: 1px solid #374151;
      border-radius: 6px;
      transition: color .15s, border-color .15s;
    }
    #preview-open-link:hover { color: #e5e7eb; border-color: #6b7280; }

    /* ── RESIZE HANDLE ── */
    #resize-handle {
      height: 8px;
      flex-shrink: 0;
      background: #1e293b;
      cursor: row-resize;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s;
      user-select: none;
      -webkit-user-select: none;
    }
    #resize-handle:hover,
    #resize-handle.dragging { background: rgba(124,58,237,.25); }
    #resize-handle::before {
      content: '';
      width: 48px; height: 3px;
      background: #374151; border-radius: 2px;
      transition: background .15s;
    }
    #resize-handle:hover::before,
    #resize-handle.dragging::before { background: #7c3aed; }

    /* ── BOTTOM PANEL ── */
    #bottom-panel {
      flex: 1;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      padding: 8px 12px;
      gap: 7px;
      overflow: hidden;
    }

    #sheet-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      gap: 8px;
    }

    #sheet-title {
      font-size: 12px; font-weight: 700; color: #6b7280;
      text-transform: uppercase; letter-spacing: .06em; flex-shrink: 0;
    }

    #sheet-controls { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; justify-content: flex-end; }

    #slot-count { font-size: 12px; color: #6b7280; white-space: nowrap; }

    #folder-btn {
      padding: 5px 10px; background: transparent; color: #9ca3af;
      border: 1px solid #374151; border-radius: 6px; font-size: 12px;
      cursor: pointer; transition: all .15s;
      max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    #folder-btn:hover  { color: #e5e7eb; border-color: #6b7280; }
    #folder-btn.active { color: #6ee7b7; border-color: #059669; }

    #generate-pdf-btn {
      padding: 5px 13px; background: #7c3aed; color: white;
      border: none; border-radius: 6px; font-size: 13px; font-weight: 600;
      cursor: pointer; white-space: nowrap; transition: background .15s;
    }
    #generate-pdf-btn:hover    { background: #6d28d9; }
    #generate-pdf-btn:disabled { background: #374151; color: #6b7280; cursor: not-allowed; }

    #clear-sheet-btn {
      padding: 5px 10px; background: transparent; color: #6b7280;
      border: 1px solid #374151; border-radius: 6px; font-size: 13px;
      cursor: pointer; transition: color .15s, border-color .15s;
    }
    #clear-sheet-btn:hover { color: #f87171; border-color: #f87171; }

    /* ── SHEET GRID ── */
    #sheet-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 6px;
      overflow: hidden;
    }

    .sheet-slot {
      border: 2px dashed #374151; border-radius: 8px; background: #0f172a;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative; transition: border-color .15s, background .15s;
    }
    .sheet-slot.empty::before {
      content: attr(data-slot-number);
      font-size: 1.3rem; font-weight: 700; color: #1e293b; pointer-events: none;
    }
    .sheet-slot.filled                         { border-style: solid; border-color: #5b21b6; cursor: pointer; }
    .sheet-slot.filled:hover                   { border-color: #ef4444; }
    .sheet-slot.filled:hover .remove-overlay   { opacity: 1; }

    .sheet-slot.drag-over {
      border-style: solid !important; border-color: #f59e0b !important;
      background: rgba(245,158,11,.08) !important;
    }
    .sheet-slot.drag-over::after {
      content: 'Drop'; position: absolute;
      font-size: 11px; font-weight: 700; color: #f59e0b; z-index: 2; pointer-events: none;
    }

    .sheet-slot img { width: 100%; height: 100%; object-fit: contain; display: block; }

    .remove-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,.65);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity .15s;
      font-size: 12px; font-weight: 600; color: #fca5a5; pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- TOP: Search + Split Results -->
  <div id="top-panel">
    <div id="search-bars">
      <div class="search-row">
        <span class="source-badge scryfall-badge">Scryfall</span>
        <input id="scryfall-input" class="search-input" type="text"
               placeholder="Card name (e.g. Lightning Bolt)…" autocomplete="off">
        <button id="scryfall-btn" class="search-btn">Search</button>
        <button id="batch-toggle-btn" title="Paste a list of card names to batch-search">📋 Batch</button>
      </div>
      <div class="search-row">
        <span class="source-badge da-badge">DeviantArt</span>
        <input id="da-input" class="search-input" type="text"
               placeholder="Search artwork (e.g. lightning bolt)…" autocomplete="off">
        <button id="da-btn" class="search-btn">Search</button>
      </div>
    </div>

    <div id="batch-panel" hidden>
      <textarea id="batch-input"
                placeholder="One card name per line:&#10;Lightning Bolt&#10;Black Lotus&#10;Counterspell"></textarea>
      <div id="batch-controls">
        <button id="batch-search-btn">Search All on Scryfall</button>
        <span id="batch-progress"></span>
        <button id="batch-cancel-btn" hidden>Cancel</button>
      </div>
    </div>

    <div id="general-status"></div>

    <!-- Left: thumbnail grid | Right: large preview -->
    <div id="results-container">

      <!-- Left: all results (Scryfall + DeviantArt combined) -->
      <div id="art-grid-pane">
        <div class="pane-header">
          <span class="source-badge scryfall-badge">SC</span>
          <span class="pane-status" id="scryfall-status">Enter a card name above</span>
        </div>
        <div class="pane-header">
          <span class="source-badge da-badge">DA</span>
          <span class="pane-status" id="da-status">Enter a search above</span>
        </div>
        <div id="art-grid"></div>
      </div>

      <!-- Right: large preview of selected art -->
      <div id="preview-pane">
        <div id="preview-empty">
          <div id="preview-empty-icon">🖼</div>
          <div>Click a card to preview</div>
        </div>
        <div id="preview-content" style="display:none">
          <div id="preview-img-wrap">
            <img id="preview-img" crossorigin="anonymous" alt="">
          </div>
          <div id="preview-meta">
            <div id="preview-name"></div>
            <div id="preview-label"></div>
            <div id="preview-actions">
              <span id="preview-badge" class="source-badge"></span>
              <button id="preview-add-btn">+ Add to Sheet</button>
              <button id="preview-download-btn">⬇ Download</button>
              <a id="preview-open-link" href="#" target="_blank" rel="noopener" style="display:none">Open ↗</a>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Draggable resize handle -->
  <div id="resize-handle"></div>

  <!-- BOTTOM: Sheet + PDF -->
  <div id="bottom-panel">
    <div id="sheet-header">
      <span id="sheet-title">Print Sheet — drag local images onto slots</span>
      <div id="sheet-controls">
        <button id="folder-btn" title="Set local save folder">📁 Set folder</button>
        <span id="slot-count">0 / 9 filled</span>
        <button id="clear-sheet-btn">Clear</button>
        <button id="generate-pdf-btn" disabled>Generate PDF</button>
      </div>
    </div>
    <div id="sheet-grid"></div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {

      // ── Constants ──────────────────────────────────────────────
      const SCRYFALL_SEARCH = 'https://api.scryfall.com/cards/search';
      const DA_RSS          = 'https://backend.deviantart.com/rss.xml';
      const CORS_PROXY      = 'https://corsproxy.io/?url=';
      const SUPPORTS_DIR_PICKER = 'showDirectoryPicker' in window;

      // ── State ──────────────────────────────────────────────────
      const state = {
        sheet:            new Array(9).fill(null),
        dirHandle:        null,
        isScSearching:    false,
        isDaSearching:    false,
        isBatchSearching: false,
        batchCancelled:   false,
        previewItem:      null,   // currently previewed artwork item
        previewCardEl:    null,   // the thumbnail DOM element in the grid
      };

      // ── DOM References ─────────────────────────────────────────
      const scryfallInput   = document.getElementById('scryfall-input');
      const scryfallBtn     = document.getElementById('scryfall-btn');
      const daInput         = document.getElementById('da-input');
      const daBtn           = document.getElementById('da-btn');
      const batchToggleBtn  = document.getElementById('batch-toggle-btn');
      const batchPanel      = document.getElementById('batch-panel');
      const batchInput      = document.getElementById('batch-input');
      const batchSearchBtn  = document.getElementById('batch-search-btn');
      const batchCancelBtn  = document.getElementById('batch-cancel-btn');
      const batchProgress   = document.getElementById('batch-progress');
      const artGrid         = document.getElementById('art-grid');
      const scryfallStatus  = document.getElementById('scryfall-status');
      const daStatus        = document.getElementById('da-status');
      const generalStatus   = document.getElementById('general-status');
      const sheetGrid       = document.getElementById('sheet-grid');
      const slotCountEl     = document.getElementById('slot-count');
      const generatePdfBtn  = document.getElementById('generate-pdf-btn');
      const clearSheetBtn   = document.getElementById('clear-sheet-btn');
      const folderBtn       = document.getElementById('folder-btn');
      const resizeHandle    = document.getElementById('resize-handle');

      // Preview pane refs
      const previewEmpty    = document.getElementById('preview-empty');
      const previewContent  = document.getElementById('preview-content');
      const previewImg      = document.getElementById('preview-img');
      const previewName     = document.getElementById('preview-name');
      const previewLabel    = document.getElementById('preview-label');
      const previewBadge    = document.getElementById('preview-badge');
      const previewAddBtn      = document.getElementById('preview-add-btn');
      const previewDownloadBtn = document.getElementById('preview-download-btn');
      const previewOpenLink    = document.getElementById('preview-open-link');

      // ── Pre-render 9 Sheet Slots ────────────────────────────────
      const sheetSlots = [];
      for (let i = 0; i < 9; i++) {
        const slot = document.createElement('div');
        slot.className = 'sheet-slot empty';
        slot.dataset.slotNumber = i + 1;
        sheetGrid.appendChild(slot);
        sheetSlots.push(slot);
        setupSlotDragDrop(slot, i);
      }

      // ── Resize Handle ──────────────────────────────────────────
      const MIN_H = 120;
      let resizing = false;

      resizeHandle.addEventListener('mousedown', e => {
        resizing = true;
        e.preventDefault();
        resizeHandle.classList.add('dragging');
        document.body.style.cursor = 'row-resize';
        document.body.style.userSelect = 'none';
      });

      document.addEventListener('mousemove', e => {
        if (!resizing) return;
        const max = window.innerHeight - 8 - MIN_H;
        const h   = Math.max(MIN_H, Math.min(max, e.clientY));
        document.documentElement.style.setProperty('--top-height', `${h}px`);
      });

      document.addEventListener('mouseup', () => {
        if (!resizing) return;
        resizing = false;
        resizeHandle.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
      });

      // ── Utilities ──────────────────────────────────────────────

      function setPaneStatus(el, msg, type = 'info') {
        el.textContent = msg;
        el.className   = `pane-status ${type}`;
      }

      function showStatus(msg, type = 'info') {
        generalStatus.textContent = msg;
        generalStatus.className   = type;
      }

      function simpleHash(str) {
        let h = 0;
        for (let i = 0; i < str.length; i++) h = (Math.imul(31, h) + str.charCodeAt(i)) | 0;
        return (h >>> 0).toString(16).padStart(8, '0');
      }

      function makeFilename(name, imageUrl) {
        const safe = name.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '');
        return `${safe}_${simpleHash(imageUrl)}.jpg`;
      }

      // ── Preview Panel ──────────────────────────────────────────

      function showPreview(item, cardEl) {
        // Deselect previous
        artGrid.querySelectorAll('.result-card.selected').forEach(el => el.classList.remove('selected'));
        cardEl.classList.add('selected');

        state.previewItem   = item;
        state.previewCardEl = cardEl;

        previewImg.src = item.imageUrl;
        previewImg.alt = item.name;
        previewName.textContent = item.name;
        previewLabel.textContent = item.label || '';

        previewBadge.textContent = item.source === 'scryfall' ? 'Scryfall' : 'DeviantArt';
        previewBadge.className   = `source-badge ${item.source === 'scryfall' ? 'scryfall-badge' : 'da-badge'}`;

        if (item.pageUrl) {
          previewOpenLink.href = item.pageUrl;
          previewOpenLink.style.display = '';
        } else {
          previewOpenLink.style.display = 'none';
        }

        previewAddBtn.disabled = false;
        previewEmpty.style.display   = 'none';
        previewContent.style.display = 'flex';
      }

      function clearPreview() {
        state.previewItem   = null;
        state.previewCardEl = null;
        artGrid.querySelectorAll('.result-card.selected').forEach(el => el.classList.remove('selected'));
        previewImg.src = '';
        previewEmpty.style.display   = '';
        previewContent.style.display = 'none';
      }

      // ── Drag & Drop onto Sheet Slots ───────────────────────────

      function setupSlotDragDrop(slot, index) {
        slot.addEventListener('dragenter', e => { e.preventDefault(); slot.classList.add('drag-over'); });
        slot.addEventListener('dragover',  e => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; });
        slot.addEventListener('dragleave', e => { if (!slot.contains(e.relatedTarget)) slot.classList.remove('drag-over'); });
        slot.addEventListener('drop', e => {
          e.preventDefault(); e.stopPropagation();
          slot.classList.remove('drag-over');
          const file = e.dataTransfer.files[0];
          if (!file || !file.type.startsWith('image/')) { showStatus('Drop an image file onto a slot.', 'error'); return; }
          const reader = new FileReader();
          reader.onload = ev => {
            state.sheet[index] = { imageUrl: ev.target.result, name: file.name.replace(/\.[^.]+$/, ''), label: `Local: ${file.name}`, source: 'local' };
            renderSheet();
            showStatus(`Slot ${index + 1}: loaded "${file.name}"`, 'info');
          };
          reader.readAsDataURL(file);
        });
      }

      document.addEventListener('dragover', e => e.preventDefault());
      document.addEventListener('drop',     e => e.preventDefault());

      // ── Scryfall API ───────────────────────────────────────────

      function extractScryfallImageUrl(card) {
        if (card.image_uris?.normal)                  return card.image_uris.normal;
        if (card.card_faces?.[0]?.image_uris?.normal) return card.card_faces[0].image_uris.normal;
        return null;
      }

      async function searchScryfall(query) {
        await new Promise(r => setTimeout(r, 100));

        const params = new URLSearchParams({
          q: `!"${query}" include:extras`,
          unique: 'prints',
          order: 'released',
        });
        const res = await fetch(`${SCRYFALL_SEARCH}?${params}`);

        if (res.status === 404) return [];
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.details || `HTTP ${res.status}`);
        }

        const data     = await res.json();
        const seenUrls = new Set();
        return (data.data || []).flatMap(card => {
          const imageUrl = extractScryfallImageUrl(card);
          if (!imageUrl || seenUrls.has(imageUrl)) return [];
          seenUrls.add(imageUrl);
          const set        = card.set_name || '';
          const year       = card.released_at?.slice(0, 4) || '';
          const artist     = card.artist || card.card_faces?.[0]?.artist || '';
          const treatments = (card.frame_effects || []).join(', ');
          const label      = [set, year ? `(${year})` : '', treatments || null, artist ? `• ${artist}` : ''].filter(Boolean).join(' ');
          return [{ imageUrl, name: query, source: 'scryfall', label }];
        });
      }

      // ── DeviantArt RSS API ─────────────────────────────────────

      function parseDeviantArtRss(xmlText, queryName) {
        const NS_MEDIA = 'http://search.yahoo.com/mrss/';
        const xml      = new DOMParser().parseFromString(xmlText, 'application/xml');
        if (xml.querySelector('parsererror')) throw new Error('Could not parse DeviantArt response');

        const results = [];
        xml.querySelectorAll('item').forEach(item => {
          const title     = item.querySelector('title')?.textContent?.trim() || '';
          const guid      = item.querySelector('guid')?.textContent?.trim()  || '';
          const authorRaw = item.querySelector('author')?.textContent?.trim() || '';
          const contentEl = item.getElementsByTagNameNS(NS_MEDIA, 'content')[0];
          const thumbEl   = item.getElementsByTagNameNS(NS_MEDIA, 'thumbnail')[0];
          const imageUrl  = contentEl?.getAttribute('url') || thumbEl?.getAttribute('url') || '';
          if (!imageUrl || !title) return;
          const m      = authorRaw.match(/\((.+?)\)/);
          const artist = m ? m[1] : authorRaw;
          results.push({ imageUrl, name: queryName, source: 'deviantart', pageUrl: guid,
            label: `${title}${artist ? ` • ${artist}` : ''}` });
        });
        return results;
      }

      async function searchDeviantArt(query) {
        const rssUrl  = `${DA_RSS}?q=${encodeURIComponent('mtg ' + query)}&type=deviation&limit=24`;
        const proxied = CORS_PROXY + encodeURIComponent(rssUrl);
        const res     = await fetch(proxied);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return parseDeviantArtRss(await res.text(), query);
      }

      // ── Rendering ──────────────────────────────────────────────

      // Remove all cards of a given source from the combined grid.
      // If the currently previewed item is from this source, clear the preview.
      function clearSourceFromGrid(source) {
        if (state.previewItem?.source === source) clearPreview();
        artGrid.querySelectorAll(`.result-card[data-source="${source}"]`).forEach(el => el.remove());
      }

      // Creates a card tile. On click: show large preview on the right.
      function makeResultCard(item) {
        const div = document.createElement('div');
        div.className = 'result-card';
        div.dataset.source = item.source;

        const img       = document.createElement('img');
        img.src         = item.imageUrl;
        img.alt         = item.name;
        img.loading     = 'lazy';
        img.crossOrigin = 'anonymous';

        const badge       = document.createElement('span');
        badge.className   = `source-badge card-source-badge ${item.source === 'scryfall' ? 'scryfall-badge' : 'da-badge'}`;
        badge.textContent = item.source === 'scryfall' ? 'SC' : 'DA';

        const label       = document.createElement('div');
        label.className   = 'card-label';
        label.textContent = item.label;

        div.appendChild(img);
        div.appendChild(badge);
        div.appendChild(label);

        div.addEventListener('click', () => showPreview(item, div));

        return div;
      }

      function renderResults(items, statusEl, source) {
        clearSourceFromGrid(source);
        if (items.length === 0) { setPaneStatus(statusEl, 'No results found.'); return; }
        setPaneStatus(statusEl, `${items.length} result${items.length !== 1 ? 's' : ''} — click to preview`, 'info');
        items.forEach(item => artGrid.appendChild(makeResultCard(item)));
      }

      // Appends without clearing — for batch search streaming
      function appendToGrid(items) {
        items.forEach(item => artGrid.appendChild(makeResultCard(item)));
      }

      function renderSheet() {
        const filled = state.sheet.filter(Boolean).length;
        slotCountEl.textContent = `${filled} / 9 filled`;
        generatePdfBtn.disabled = filled === 0;
        state.sheet.forEach((item, i) => renderSlot(i, item));
      }

      function renderSlot(index, item) {
        const slot   = sheetSlots[index];
        slot.innerHTML = '';
        slot.onclick   = null;

        if (!item) {
          slot.className          = 'sheet-slot empty';
          slot.dataset.slotNumber = index + 1;
          slot.title              = '';
          return;
        }

        slot.className = 'sheet-slot filled';
        slot.removeAttribute('data-slot-number');
        slot.title = `${item.name}\n${item.label}\nClick to remove`;

        const img       = document.createElement('img');
        img.src         = item.imageUrl;
        img.alt         = item.name;
        img.crossOrigin = item.source !== 'local' ? 'anonymous' : '';

        const overlay       = document.createElement('div');
        overlay.className   = 'remove-overlay';
        overlay.textContent = '✕ Remove';

        slot.appendChild(img);
        slot.appendChild(overlay);
        slot.onclick = () => handleSlotClick(index);
      }

      // ── File System Saving ─────────────────────────────────────

      function updateFolderBtn() {
        if (!SUPPORTS_DIR_PICKER) {
          folderBtn.textContent = '📁 Downloads folder';
          folderBtn.title = 'Firefox: images save to your configured downloads folder.\nTo change it: Firefox Settings → Downloads.';
          folderBtn.classList.add('active');
          return;
        }
        if (state.dirHandle) {
          folderBtn.textContent = `📁 ${state.dirHandle.name}`;
          folderBtn.classList.add('active');
        } else {
          folderBtn.textContent = '📁 Set folder';
          folderBtn.classList.remove('active');
        }
      }

      updateFolderBtn();

      async function pickFolder() {
        if (!SUPPORTS_DIR_PICKER) {
          showStatus('Firefox detected — images will download to your configured downloads folder.', 'info');
          return true;
        }
        try {
          state.dirHandle = await window.showDirectoryPicker({ mode: 'readwrite', startIn: 'pictures', id: 'mtg-artworks' });
          updateFolderBtn();
          showStatus(`Save folder: ${state.dirHandle.name}`, 'info');
          return true;
        } catch (e) {
          if (e.name !== 'AbortError') showStatus(`Folder error: ${e.message}`, 'error');
          return false;
        }
      }

      async function saveImageLocally(item) {
        if (item.source === 'local') return;

        const filename = makeFilename(item.name, item.imageUrl);

        if (state.dirHandle) {
          try {
            const res    = await fetch(item.imageUrl);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const blob   = await res.blob();
            const fh     = await state.dirHandle.getFileHandle(filename, { create: true });
            const writer = await fh.createWritable();
            await writer.write(blob);
            await writer.close();
            showStatus(`Saved: ${filename}`, 'info');
            return;
          } catch (err) {
            console.warn('Folder save failed, falling back to download:', err);
          }
        }

        // Fallback (Firefox + Chrome without folder set): trigger download
        try {
          const res    = await fetch(item.imageUrl);
          const blob   = await res.blob();
          const objUrl = URL.createObjectURL(blob);
          const a      = Object.assign(document.createElement('a'), { href: objUrl, download: filename });
          a.click();
          setTimeout(() => URL.revokeObjectURL(objUrl), 10000);
          if (!state.dirHandle) showStatus(`Downloaded: ${filename}`, 'info');
        } catch (err) {
          console.warn('Image download failed:', err);
        }
      }

      // ── Search Handlers ─────────────────────────────────────────

      function handleScryfallSearch() {
        const query = scryfallInput.value.trim();
        if (!query || state.isScSearching) return;
        state.isScSearching  = true;
        scryfallBtn.disabled = true;
        setPaneStatus(scryfallStatus, 'Searching…', 'loading');
        searchScryfall(query)
          .then(items  => renderResults(items, scryfallStatus, 'scryfall'))
          .catch(err   => setPaneStatus(scryfallStatus, err.message, 'error'))
          .finally(()  => { state.isScSearching = false; scryfallBtn.disabled = false; });
      }

      function handleDaSearch() {
        const query = daInput.value.trim();
        if (!query || state.isDaSearching) return;
        state.isDaSearching = true;
        daBtn.disabled      = true;
        setPaneStatus(daStatus, 'Searching…', 'loading');
        searchDeviantArt(query)
          .then(items  => renderResults(items, daStatus, 'deviantart'))
          .catch(err   => setPaneStatus(daStatus, err.message, 'error'))
          .finally(()  => { state.isDaSearching = false; daBtn.disabled = false; });
      }

      // ── Batch Search ───────────────────────────────────────────

      function handleBatchToggle() {
        const isOpen = !batchPanel.hidden;
        batchPanel.hidden = isOpen;
        batchToggleBtn.classList.toggle('batch-open', !isOpen);
        if (!isOpen) batchInput.focus();
      }

      async function handleBatchSearch() {
        const lines = batchInput.value.split('\n').map(l => l.trim()).filter(Boolean);
        if (!lines.length) return;

        state.batchCancelled    = false;
        state.isBatchSearching  = true;
        batchSearchBtn.disabled = true;
        batchCancelBtn.hidden   = false;
        clearSourceFromGrid('scryfall');
        setPaneStatus(scryfallStatus, `Batch: 0 / ${lines.length}…`, 'loading');

        let found = 0;
        for (let i = 0; i < lines.length; i++) {
          if (state.batchCancelled) break;
          const name = lines[i];
          batchProgress.textContent = `${i + 1} / ${lines.length}: ${name}`;
          try {
            const items = await searchScryfall(name);
            if (items.length) { appendToGrid(items); found += items.length; }
          } catch (err) {
            console.warn(`Skipping "${name}":`, err.message);
          }
        }

        const cancelled         = state.batchCancelled;
        state.isBatchSearching  = false;
        batchSearchBtn.disabled = false;
        batchCancelBtn.hidden   = true;
        batchProgress.textContent = '';
        setPaneStatus(scryfallStatus,
          cancelled
            ? 'Batch cancelled.'
            : `Batch done — ${found} artwork${found !== 1 ? 's' : ''} from ${lines.length} card${lines.length !== 1 ? 's' : ''}`,
          'info'
        );
      }

      // ── Preview: Add to Sheet ───────────────────────────────────

      previewDownloadBtn.addEventListener('click', async () => {
        if (!state.previewItem) return;
        const item = state.previewItem;
        if (item.source === 'local') return;
        const filename = makeFilename(item.name, item.imageUrl);
        try {
          const res    = await fetch(item.imageUrl);
          const blob   = await res.blob();
          const objUrl = URL.createObjectURL(blob);
          const a      = Object.assign(document.createElement('a'), { href: objUrl, download: filename });
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          setTimeout(() => URL.revokeObjectURL(objUrl), 10000);
          showStatus(`Downloaded: ${filename}`, 'info');
        } catch (err) {
          showStatus(`Download failed: ${err.message}`, 'error');
        }
      });

      previewAddBtn.addEventListener('click', () => {
        if (!state.previewItem) return;
        const firstEmpty = state.sheet.indexOf(null);
        if (firstEmpty === -1) {
          showStatus('Sheet is full (9/9). Click a slot to remove it first.', 'error');
          return;
        }
        const item   = state.previewItem;
        const cardEl = state.previewCardEl;

        state.sheet[firstEmpty] = item;
        cardEl?.remove();       // remove thumbnail from grid
        clearPreview();
        renderSheet();
        saveImageLocally(item);
      });

      // ── Slot / Sheet Handlers ──────────────────────────────────

      function handleSlotClick(index) {
        state.sheet[index] = null;
        renderSheet();
      }

      function handleClearSheet() {
        state.sheet.fill(null);
        renderSheet();
      }

      // ── PDF Generation ──────────────────────────────────────────

      function loadImageAsDataUrl(url) {
        if (url.startsWith('data:')) return Promise.resolve(url);
        return new Promise((resolve, reject) => {
          const img       = new Image();
          img.crossOrigin = 'anonymous';
          img.onload      = () => {
            const canvas  = document.createElement('canvas');
            canvas.width  = img.naturalWidth;
            canvas.height = img.naturalHeight;
            const ctx     = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0);
            resolve(canvas.toDataURL('image/jpeg', 0.92));
          };
          img.onerror = () => reject(new Error(`Image load failed: ${url}`));
          img.src     = url;
        });
      }

      async function handleGeneratePdf() {
        generatePdfBtn.disabled    = true;
        generatePdfBtn.textContent = 'Generating…';
        try {
          const { jsPDF } = window.jspdf;
          const doc = new jsPDF({ orientation: 'p', unit: 'mm', format: 'letter' });

          const PAGE_W = 215.9, PAGE_H = 279.4, MARGIN = 10, GAP = 3, CARD_RATIO = 5 / 7;
          const usable_w = PAGE_W - 2 * MARGIN;
          const usable_h = PAGE_H - 2 * MARGIN;
          const cell_w   = (usable_w - 2 * GAP) / 3;
          const cell_h   = (usable_h - 2 * GAP) / 3;

          const dataUrls = await Promise.all(
            state.sheet.map(item =>
              item ? loadImageAsDataUrl(item.imageUrl).catch(() => null) : Promise.resolve(null)
            )
          );

          for (let i = 0; i < 9; i++) {
            const col = i % 3, row = Math.floor(i / 3);
            const cell_x = MARGIN + col * (cell_w + GAP);
            const cell_y = MARGIN + row * (cell_h + GAP);

            if (!dataUrls[i]) {
              doc.setDrawColor(180, 180, 180); doc.setLineWidth(0.3);
              doc.rect(cell_x, cell_y, cell_w, cell_h);
              doc.setFontSize(10); doc.setTextColor(180, 180, 180);
              doc.text(String(i + 1), cell_x + cell_w / 2, cell_y + cell_h / 2, { align: 'center' });
              continue;
            }

            let img_w = cell_w, img_h = cell_w / CARD_RATIO;
            if (img_h > cell_h) { img_h = cell_h; img_w = cell_h * CARD_RATIO; }
            doc.addImage(dataUrls[i], 'JPEG',
              cell_x + (cell_w - img_w) / 2, cell_y + (cell_h - img_h) / 2, img_w, img_h);
          }

          doc.save('mtg-card-sheet.pdf');
        } catch (err) {
          alert(`PDF generation failed: ${err.message}`);
        } finally {
          generatePdfBtn.disabled    = state.sheet.filter(Boolean).length === 0;
          generatePdfBtn.textContent = 'Generate PDF';
        }
      }

      // ── Event Wiring ────────────────────────────────────────────

      scryfallBtn.addEventListener('click', handleScryfallSearch);
      scryfallInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleScryfallSearch(); });

      daBtn.addEventListener('click', handleDaSearch);
      daInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleDaSearch(); });

      batchToggleBtn.addEventListener('click', handleBatchToggle);
      batchSearchBtn.addEventListener('click', handleBatchSearch);
      batchCancelBtn.addEventListener('click', () => { state.batchCancelled = true; });

      folderBtn.addEventListener('click', () => pickFolder());
      generatePdfBtn.addEventListener('click', handleGeneratePdf);
      clearSheetBtn.addEventListener('click', handleClearSheet);

    });
  </script>
</body>
</html>
